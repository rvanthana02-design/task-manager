<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
input, button {
  padding: 10px;
  margin: 5px;
}
.task {
  background: #1e293b;
  margin: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<h1>🔥 Task Manager PRO</h1>

<input id="taskInput" placeholder="Task">
<input type="date" id="date">
<input type="time" id="time">
<button onclick="addTask()">Add</button>

<div id="tasks"></div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

// Register Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

// Notification permission
Notification.requestPermission();

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  tasks.push({
    text: taskInput.value,
    date: date.value,
    time: time.value,
    notified: false
  });
  save();
  render();
}

function render() {
  tasksDiv.innerHTML = "";
  tasks.forEach(t => {
    tasksDiv.innerHTML += `
      <div class="task">
        <b>${t.text}</b><br>
        ${t.date} ${t.time}
      </div>
    `;
  });
}

setInterval(() => {
  const now = new Date();

  tasks.forEach((t, i) => {
    if (!t.notified && t.date && t.time) {
      const taskTime = new Date(`${t.date}T${t.time}`);

      if (now >= taskTime) {
        notify(t.text);
        tasks[i].notified = true;
        save();
      }
    }
  });
}, 1000);

function notify(msg) {
  if (Notification.permission === "granted") {
    navigator.serviceWorker.getRegistration().then(reg => {
      reg.showNotification("⏰ Reminder", {
        body: msg,
        icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
      });
    });
  }
}

render();
</script>

</body>
</html>
