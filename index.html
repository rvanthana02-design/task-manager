<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Task Manager Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#667eea,#764ba2);
      transition:0.3s;
    }

    .app{
      width:380px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(15px);
      border-radius:20px;
      padding:20px;
      color:#fff;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    h2{text-align:center;margin-bottom:15px}

    .input-box{display:flex;gap:8px;margin-bottom:10px}

    input, select{
      padding:10px;
      border:none;
      border-radius:10px;
      outline:none;
      flex:1;
    }

    button{
      padding:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#ff7eb3;
      color:#fff;
      transition:0.3s;
    }

    button:hover{background:#ff4f91}

    ul{list-style:none;max-height:260px;overflow-y:auto}

    li{
      background:rgba(255,255,255,0.2);
      margin-bottom:10px;
      padding:10px;
      border-radius:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      cursor:grab;
      animation:fadeIn 0.3s ease;
    }

    li.completed{opacity:0.5;text-decoration:line-through}

    .task-info{display:flex;flex-direction:column}

    .due{font-size:12px;opacity:0.8}

    .actions button{background:transparent;border:1px solid #fff;margin-left:5px}

    .progress{text-align:center;margin-top:10px;font-size:14px}

    .theme-toggle{text-align:center;margin-top:10px;cursor:pointer}

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }

    .dark{
      background:#1e1e2f;
    }
  </style>
</head>
<body>

<div class="app">
  <h2>🚀 Task Manager Pro</h2>

  <div class="input-box">
    <input id="taskInput" placeholder="Enter task" />
    <input type="date" id="dueDate" />
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

  <div class="progress" id="progress"></div>

  <div class="theme-toggle" onclick="toggleTheme()">🌙 Toggle Theme</div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
let dragIndex = null;

function save(){
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

function addTask(){
  const text = taskInput.value.trim();
  const due = dueDate.value;
  if(!text) return;

  tasks.push({text, due, completed:false});
  taskInput.value=''; dueDate.value='';
  render();
  notify("Task Added ✅");
}

function render(){
  const list = document.getElementById('taskList');
  list.innerHTML='';

  tasks.forEach((t,i)=>{
    const li=document.createElement('li');
    li.draggable=true;

    if(t.completed) li.classList.add('completed');

    li.innerHTML=`
      <div class="task-info">
        <span>${t.text}</span>
        <span class="due">${t.due ? 'Due: '+t.due : ''}</span>
      </div>
      <div class="actions">
        <button onclick="toggleTask(${i})">✔</button>
        <button onclick="deleteTask(${i})">✖</button>
      </div>
    `;

    li.addEventListener('dragstart',()=>dragIndex=i);
    li.addEventListener('dragover',(e)=>e.preventDefault());
    li.addEventListener('drop',()=>{
      const temp = tasks[i];
      tasks[i]=tasks[dragIndex];
      tasks[dragIndex]=temp;
      render();
    });

    list.appendChild(li);
  });

  updateProgress();
  save();
}

function toggleTask(i){
  tasks[i].completed=!tasks[i].completed;
  render();
}

function deleteTask(i){
  tasks.splice(i,1);
  render();
  notify("Task Deleted ❌");
}

function updateProgress(){
  const done = tasks.filter(t=>t.completed).length;
  progress.innerText=`Progress: ${done}/${tasks.length}`;
}

function toggleTheme(){
  document.body.classList.toggle('dark');
}

function notify(msg){
  if(Notification.permission==='granted'){
    new Notification(msg);
  }else if(Notification.permission!=='denied'){
    Notification.requestPermission();
  }
}

render();
</script>

</body>
</html>
