<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Task Pro</title>
    <style>
        /* CSS - Premium UI Design */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Container */
        .glass-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
        }

        h2 { text-align: center; margin-bottom: 25px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        .input-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }

        /* Glassmorphism Inputs */
        input {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.7); }

        .dt-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Glassmorphism Buttons */
        .btn {
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            font-weight: 600;
            border-radius: 10px;
        }

        .add-btn {
            background: rgba(74, 144, 226, 0.4);
            padding: 15px;
            color: white;
            width: 100%;
        }
        .add-btn:hover { background: rgba(74, 144, 226, 0.7); transform: translateY(-2px); }

        .filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .filter-btn {
            padding: 6px 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 13px;
        }
        .filter-btn.active { background: white; color: #333; }

        ul { list-style: none; }
        li {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        li:hover { background: rgba(255, 255, 255, 0.2); }

        .task-info { display: flex; flex-direction: column; flex: 1; cursor: pointer; }
        .task-title { font-size: 16px; font-weight: 500; }
        .task-meta { font-size: 11px; opacity: 0.8; margin-top: 5px; }
        
        .completed .task-title { text-decoration: line-through; opacity: 0.5; }

        .actions { display: flex; gap: 8px; }
        .edit-btn { background: rgba(243, 156, 18, 0.4); padding: 5px 10px; color: white; }
        .del-btn { background: rgba(231, 76, 60, 0.4); padding: 5px 10px; color: white; }
    </style>
</head>
<body>

<div class="glass-container">
    <h2>Task Dashboard</h2>
    
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Task description...">
        <div class="dt-row">
            <input type="date" id="dateInput">
            <input type="time" id="timeInput">
        </div>
        <button class="btn add-btn" id="saveBtn" onclick="addOrUpdateTask()">Save Task</button>
    </div>

    <div class="filters">
        <button class="btn filter-btn active" onclick="filterTasks('all', this)">All</button>
        <button class="btn filter-btn" onclick="filterTasks('pending', this)">Pending</button>
        <button class="btn filter-btn" onclick="filterTasks('completed', this)">Completed</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    /* JavaScript Logic */
    let tasks = JSON.parse(localStorage.getItem("glassTasks")) || [];
    let editId = null;
    let currentFilter = 'all';

    function saveAndRender() {
        localStorage.setItem("glassTasks", JSON.stringify(tasks));
        render();
    }

    function addOrUpdateTask() {
        const title = document.getElementById("taskInput").value;
        const date = document.getElementById("dateInput").value;
        const time = document.getElementById("timeInput").value;

        // Validation: Date is mandatory
        if (!title) return alert("Please enter a task!");
        if (!date) return alert("Error: Please set a Date for this task!");

        if (editId !== null) {
            tasks = tasks.map(t => t.id === editId ? {...t, title, date, time} : t);
            editId = null;
            document.getElementById("saveBtn").innerText = "Save Task";
        } else {
            tasks.push({ id: Date.now(), title, date, time, completed: false });
        }

        // Reset fields
        document.getElementById("taskInput").value = "";
        document.getElementById("dateInput").value = "";
        document.getElementById("timeInput").value = "";
        saveAndRender();
    }

    function deleteTask(id) {
        if(confirm("Delete this task?")) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }
    }

    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
        saveAndRender();
    }

    function editTask(id) {
        const task = tasks.find(t => t.id === id);
        document.getElementById("taskInput").value = task.title;
        document.getElementById("dateInput").value = task.date;
        document.getElementById("timeInput").value = task.time;
        document.getElementById("saveBtn").innerText = "Update Task";
        editId = id;
    }

    function filterTasks(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const list = document.getElementById("taskList");
        list.innerHTML = "";

        let filtered = tasks;
        if (currentFilter === 'pending') filtered = tasks.filter(t => !t.completed);
        if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);

        filtered.forEach(t => {
            const li = document.createElement("li");
            li.className = t.completed ? "completed" : "";
            li.innerHTML = `
                <div class="task-info" onclick="toggleTask(${t.id})">
                    <span class="task-title">${t.title}</span>
                    <span class="task-meta">📅 ${t.date} ${t.time ? ' | ⏰ ' + t.time : ''}</span>
                </div>
                <div class="actions">
                    <button class="btn edit-btn" onclick="event.stopPropagation(); editTask(${t.id})">✎</button>
                    <button class="btn del-btn" onclick="event.stopPropagation(); deleteTask(${t.id})">✕</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    render();
</script>

</body>
</html>
