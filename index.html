<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Strict Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .cyber-container {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid #00f2ff;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
        }

        h2 { 
            font-family: 'Orbitron', sans-serif;
            text-align: center; 
            margin-bottom: 25px; 
            color: #00f2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00f2ff;
        }

        .input-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }

        input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00f2ff;
            border-radius: 5px;
            padding: 12px;
            color: #00f2ff;
            outline: none;
            font-family: 'Orbitron', sans-serif;
        }
        input:focus { border-color: #7000ff; box-shadow: 0 0 10px #7000ff; }

        /* Neon Buttons */
        .btn {
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .add-btn {
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            padding: 15px;
            box-shadow: 0 0 5px #00f2ff;
        }
        .add-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }

        .filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .filter-btn {
            padding: 8px 12px;
            background: transparent;
            border: 1px solid #7000ff;
            color: #7000ff;
            font-size: 11px;
        }
        .filter-btn.active { background: #7000ff; color: #fff; box-shadow: 0 0 15px #7000ff; }

        ul { list-style: none; }
        li {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00f2ff;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Strict Time Policy Styles */
        .overdue { border-left-color: #ff0055 !important; }
        .overdue .task-date { color: #ff0055 !important; text-shadow: 0 0 5px #ff0055; }
        
        .task-info { display: flex; flex-direction: column; flex: 1; cursor: pointer; }
        .task-title { font-size: 16px; color: #fff; }
        .task-date { font-size: 11px; color: #00f2ff; margin-top: 5px; font-family: 'Orbitron', sans-serif; }
        
        .completed { border-left-color: #7000ff !important; opacity: 0.5; }
        .completed .task-title { text-decoration: line-through; color: #7000ff; }

        .actions { display: flex; gap: 8px; }
        .edit-btn { border: 1px solid #f39c12; color: #f39c12; background: transparent; padding: 5px 8px; }
        .del-btn { border: 1px solid #ff0055; color: #ff0055; background: transparent; padding: 5px 8px; }
    </style>
</head>
<body>

<div class="cyber-container">
    <h2>Strict Protocol</h2>
    
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter Task Name...">
        <input type="date" id="dateInput">
        <button class="btn add-btn" id="saveBtn" onclick="addOrUpdateTask()">Save Entry</button>
    </div>

    <div class="filters">
        <button class="btn filter-btn active" onclick="filterTasks('all', this)">All</button>
        <button class="btn filter-btn" onclick="filterTasks('pending', this)">Pending</button>
        <button class="btn filter-btn" onclick="filterTasks('completed', this)">Completed</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem("strictTasks")) || [];
    let editId = null;
    let currentFilter = 'all';

    function saveAndRender() {
        localStorage.setItem("strictTasks", JSON.stringify(tasks));
        render();
    }

    function addOrUpdateTask() {
        const title = document.getElementById("taskInput").value.trim();
        const date = document.getElementById("dateInput").value;

        // Strict Policy: Title and Date are mandatory
        if (!title) return alert("ACCESS DENIED: Task title required.");
        if (!date) return alert("ACCESS DENIED: Strict Date Policy requires a target date.");

        if (editId !== null) {
            tasks = tasks.map(t => t.id === editId ? {...t, title, date} : t);
            editId = null;
            document.getElementById("saveBtn").innerText = "Save Entry";
        } else {
            tasks.push({ id: Date.now(), title, date, completed: false });
        }

        document.getElementById("taskInput").value = "";
        document.getElementById("dateInput").value = "";
        saveAndRender();
    }

    function deleteTask(id) {
        if(confirm("Permanently delete this record?")) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }
    }

    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
        saveAndRender();
    }

    function editTask(id) {
        const task = tasks.find(t => t.id === id);
        document.getElementById("taskInput").value = task.title;
        document.getElementById("dateInput").value = task.date;
        document.getElementById("saveBtn").innerText = "Update Entry";
        editId = id;
    }

    function filterTasks(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const list = document.getElementById("taskList");
        list.innerHTML = "";
        const today = new Date().toISOString().split('T')[0];

        let filtered = tasks;
        if (currentFilter === 'pending') filtered = tasks.filter(t => !t.completed);
        if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);

        filtered.forEach(t => {
            const isOverdue = t.date < today && !t.completed;
            const li = document.createElement("li");
            li.className = `${t.completed ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}`;
            
            li.innerHTML = `
                <div class="task-info" onclick="toggleTask(${t.id})">
                    <span class="task-title">${t.title}</span>
                    <span class="task-date">${isOverdue ? '⚠️ OVERDUE: ' : '📅 TARGET: '} ${t.date}</span>
                </div>
                <div class="actions">
                    <button class="btn edit-btn" onclick="event.stopPropagation(); editTask(${t.id})">✎</button>
                    <button class="btn del-btn" onclick="event.stopPropagation(); deleteTask(${t.id})">✕</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    render();
</script>

</body>
</html>
