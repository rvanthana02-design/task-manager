<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #7000ff;
            --neon-pink: #ff0055;
            --bg-dark: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Orbitron', sans-serif;
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }

        .container-wrapper {
            position: relative; width: 100%; max-width: 550px;
            padding: 5px; border-radius: 15px;
            background: rgba(10, 10, 15, 0.9);
        }

        .border-svg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; fill: none; pointer-events: none;
        }

        .border-rect {
            stroke: var(--neon-cyan); stroke-width: 4;
            width: 100%; height: 100%; rx: 15;
            stroke-dasharray: 2000; stroke-dashoffset: 2000;
            animation: drawBorder 3s linear forwards;
            filter: drop-shadow(0 0 8px var(--neon-cyan));
        }

        @keyframes drawBorder { to { stroke-dashoffset: 0; } }

        .cyber-container { position: relative; z-index: 1; padding: 30px; }

        h2 { text-align: center; margin-bottom: 25px; color: var(--neon-cyan); letter-spacing: 3px; text-shadow: 0 0 15px var(--neon-cyan); }

        .input-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }

        input, select {
            background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon-purple);
            border-radius: 5px; padding: 12px; color: var(--neon-cyan);
            outline: none; font-family: 'Orbitron', sans-serif; transition: 0.3s;
        }
        
        select option { background: #000; color: var(--neon-cyan); }

        .time-dropdown-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        .btn {
            cursor: pointer; border: none; transition: 0.3s;
            font-family: 'Orbitron', sans-serif; font-weight: bold;
            border-radius: 5px; text-transform: uppercase;
        }

        .add-btn {
            background: transparent; border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 15px; margin-top: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        .add-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 30px var(--neon-cyan); }

        .filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .filter-btn { padding: 8px 12px; background: transparent; border: 1px solid var(--neon-purple); color: var(--neon-purple); font-size: 11px; }
        .filter-btn.active { background: var(--neon-purple); color: #fff; box-shadow: 0 0 15px var(--neon-purple); }

        ul { list-style: none; }
        li {
            background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--neon-cyan);
            padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }

        .overdue { border-left-color: var(--neon-pink) !important; animation: pulse 2s infinite; }
        @keyframes pulse { 50% { box-shadow: 0 0 15px var(--neon-pink); } }

        .task-info { flex: 1; cursor: pointer; }
        .task-title { font-size: 15px; color: #fff; display: block; }
        .task-date { font-size: 10px; color: var(--neon-cyan); margin-top: 5px; }
        
        .completed { border-left-color: var(--neon-purple) !important; opacity: 0.5; }
        .completed .task-title { text-decoration: line-through; }

        .actions { display: flex; gap: 8px; }
        .edit-btn { border: 1px solid #f39c12; color: #f39c12; background: transparent; padding: 5px; }
        .del-btn { border: 1px solid var(--neon-pink); color: var(--neon-pink); background: transparent; padding: 5px; }
    </style>
</head>
<body>

<div class="container-wrapper">
    <svg class="border-svg"><rect class="border-rect"></rect></svg>

    <div class="cyber-container">
        <h2>My Daily Task</h2>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Command: Task Name">
            <input type="date" id="dateInput">
            
            <div class="time-dropdown-row">
                <select id="hourInput">
                    <option value="">Hour</option>
                    <option value="01">01</option><option value="02">02</option><option value="03">03</option>
                    <option value="04">04</option><option value="05">05</option><option value="06">06</option>
                    <option value="07">07</option><option value="08">08</option><option value="09">09</option>
                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                </select>
                <select id="minInput">
                    <option value="">Min</option>
                    <option value="00">00</option><option value="15">15</option>
                    <option value="30">30</option><option value="45">45</option>
                </select>
                <select id="ampmInput">
                    <option value="">AM/PM</option>
                    <option value="AM">AM</option>
                    <option value="PM">PM</option>
                </select>
            </div>
            
            <button class="btn add-btn" id="saveBtn" onclick="addOrUpdateTask()">Execute Entry</button>
        </div>

        <div class="filters">
            <button class="btn filter-btn active" onclick="filterTasks('all', this)">All</button>
            <button class="btn filter-btn" onclick="filterTasks('pending', this)">Pending</button>
            <button class="btn filter-btn" onclick="filterTasks('completed', this)">Completed</button>
        </div>

        <ul id="taskList"></ul>
    </div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem("dropdownTasks")) || [];
    let editId = null;
    let currentFilter = 'all';

    function addOrUpdateTask() {
        const title = document.getElementById("taskInput").value.trim();
        const date = document.getElementById("dateInput").value;
        const h = document.getElementById("hourInput").value;
        const m = document.getElementById("minInput").value;
        const p = document.getElementById("ampmInput").value;

        // STRICT POLICY check
        if (!title || !date || !h || !m || !p) {
            return alert("STRICT PROTOCOL: All fields (Task, Date, and Time) are required!");
        }

        const fullTime = `${h}:${m} ${p}`;

        if (editId !== null) {
            tasks = tasks.map(t => t.id === editId ? {...t, title, date, time: fullTime} : t);
            editId = null;
            document.getElementById("saveBtn").innerText = "Execute Entry";
        } else {
            tasks.push({ id: Date.now(), title, date, time: fullTime, completed: false });
        }

        // Reset
        document.getElementById("taskInput").value = "";
        document.getElementById("dateInput").value = "";
        document.getElementById("hourInput").value = "";
        document.getElementById("minInput").value = "";
        document.getElementById("ampmInput").value = "";
        
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem("dropdownTasks", JSON.stringify(tasks));
        render();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveAndRender();
    }

    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
        saveAndRender();
    }

    function editTask(id) {
        const t = tasks.find(t => t.id === id);
        document.getElementById("taskInput").value = t.title;
        document.getElementById("dateInput").value = t.date;
        const [timePart, ampm] = t.time.split(' ');
        const [hour, min] = timePart.split(':');
        document.getElementById("hourInput").value = hour;
        document.getElementById("minInput").value = min;
        document.getElementById("ampmInput").value = ampm;
        document.getElementById("saveBtn").innerText = "Update Entry";
        editId = id;
    }

    function filterTasks(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const list = document.getElementById("taskList");
        list.innerHTML = "";
        filtered = tasks;
        if (currentFilter === 'pending') filtered = tasks.filter(t => !t.completed);
        if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);

        filtered.forEach(t => {
            const li = document.createElement("li");
            li.className = t.completed ? 'completed' : '';
            li.innerHTML = `
                <div class="task-info" onclick="toggleTask(${t.id})">
                    <span class="task-title">${t.title}</span>
                    <span class="task-date">📅 ${t.date} | ⏰ ${t.time}</span>
                </div>
                <div class="actions">
                    <button class="btn edit-btn" onclick="event.stopPropagation(); editTask(${t.id})">✎</button>
                    <button class="btn del-btn" onclick="event.stopPropagation(); deleteTask(${t.id})">✕</button>
                </div>
            `;
            list.appendChild(li);
        });
    }
    render();
</script>
</body>
</html>
